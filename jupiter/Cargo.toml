[package]
name = "jupiter"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
saturn = { path = "../crates/saturn" }
sh2 = { path = "../crates/sh2" }
physdisc = { path = "../crates/physdisc" }
sdl2 = { version = "0.37", optional = true }

[features]
default = ["sdl2-frontend", "chd"]
# Toggle the SDL2 window off if the host doesn't have libsdl2-dev
# installed or if you want a headless build for CI. With the feature
# off, `cargo run -p jupiter -- BIOS` still loads the BIOS,
# runs a fixed number of frames, and dumps a one-line status report —
# useful for the BIOS-boot regression in M3 task #8.
sdl2-frontend = ["dep:sdl2"]
# Enable live physical-disc support via libcdio (`--disc=cdrom:<device>`).
# Off by default so the standard build needs no libcdio; enabling it links
# the system library through the `physdisc` crate.
physical-disc = ["physdisc/libcdio"]
# Read `.chd` (compressed) disc images (roadmap G1). On by default — the `chd`
# crate is pure Rust with no system dependency (unlike `physical-disc`), so it
# costs the standard build nothing but the compile. Turn it off for a leaner
# headless build that only needs CUE/ISO/CCD.
chd = ["saturn/chd"]

[lints]
workspace = true
